name: Update Picker Result

on:
  schedule:
    # 14:30 Asia/Shanghai on weekdays.
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

jobs:
  update-picker-result:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run picker automation
        env:
          PICKER_SUPABASE_URL: ${{ secrets.PICKER_SUPABASE_URL }}
          PICKER_SUPABASE_KEY: ${{ secrets.PICKER_SUPABASE_KEY }}
        run: python scripts/run_picker_automation.py
